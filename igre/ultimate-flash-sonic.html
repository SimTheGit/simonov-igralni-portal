<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="utf-8">
  <title>Ultimate Flash Sonic na Simonovem igralnem portalu</title>
  <link rel="stylesheet" href="../css/general.css">
  <link rel="icon" href="/igreabc-ikona.png" type="image/png">
  <style>
    .game-container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
      text-align: center;
    }

    .game-screen {
      background: #000;
      border: 5px solid #ffcc00;
      border-radius: 12px;
      overflow: hidden;
      margin: 25px auto;
      max-width: 820px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }

    .game-info {
      max-width: 720px;
      margin: 0 auto 40px auto;
      text-align: left;
    }

    .game-info h1 {
      color: #ffcc00;
      margin-bottom: 15px;
    }

    .game-desc {
      font-size: 1.05em;
      line-height: 1.65;
      color: #ddd;
    }

    .back-button {
      display: inline-block;
      margin: 30px 0;
      padding: 14px 28px;
      background: #ffcc00;
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      transition: all 0.3s;
    }

    .back-button:hover {
      background: #fff;
      transform: translateY(-3px);
    }
  </style>
</head>
<body>

  <!-- Dynamic Header -->
  <div id="header-placeholder"></div>

  <div class="game-container">
    
    <h1>Ultimate Flash Sonic</h1>

    <div class="game-screen">
      <object width="800" height="571" 
              data="../151706_ultimate_sonic202c.swf">
        <param name="movie" value="../151706_ultimate_sonic202c.swf">
        <embed src="../151706_ultimate_sonic202c.swf" 
               width="800" height="600">
      </object>
    </div>

    <div class="game-info">
      <h2>Opis igre</h2>
      <p class="game-desc">
        Legendarni Sonic potrebuje tvojo pomoč!
      </p>
    </div>

    <a href="../index.html" class="back-button">← Nazaj na vse igre</a>
  </div>

  <!-- Dynamic Footer -->
  <div id="footer-placeholder"></div>

  <!-- Load Ruffle -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <!-- Load Header and Footer -->
  <script>
    // Load Header
    fetch('../header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      })
      .catch(err => console.error('Error loading header:', err));

    // Load Footer
    fetch('../footer.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('footer-placeholder').innerHTML = data;
      })
      .catch(err => console.error('Error loading footer:', err));
  </script>

</body>
</html>
